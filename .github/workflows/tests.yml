# GitHub Actions workflow for Tic Tac Toe.
#
# On every push or pull request targeting the main branch, this workflow:
#   1. Checks out the repository.
#   2. Sets up Python 3.12.
#   3. Installs pytest (the only test dependency).
#   4. Runs the test suite with pytest.
#
# The project has no third-party runtime dependencies — only the standard
# library plus pytest for testing — so there is nothing else to install.

name: Tests

on:
  # Run on every push to main so regressions are caught as soon as they land.
  push:
    branches:
      - main
  # Run on every pull request targeting main so issues are caught before merge.
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      # Keep running the other Python versions even if one fails, so we see the
      # full picture rather than stopping at the first failure.
      fail-fast: false
      matrix:
        # Test against a single recent Python version. Add more entries here to
        # verify compatibility across versions.
        python-version: ["3.12"]

    steps:
      # Check out the repository so the runner has the project files.
      - name: Check out the repository
        uses: actions/checkout@v4

      # Install the requested Python version with pip available.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install the test dependencies. There are no runtime dependencies, so
      # only pytest needs to be installed here.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # Run the test suite. The working directory is the project root, matching
      # how the tests are intended to be run locally.
      - name: Run pytest
        run: |
          python -m pytest tests/ -v
